name: Main Config
version: 1.0.0
schema: v1
models:
  # -------------------------------------------------------------
  # 对话与复杂推理
  # -------------------------------------------------------------
  - name: (Mac Studio) DeepSeek R1 70B
    provider: ollama
    model: deepseek-r1:70b-llama-distill-q4_K_M
    apiBase: ${{ secrets.OLLAMA_MAC_STUDIO }}
    roles:
      - chat
      - edit
      - apply

  - name: (Mac Studio) qwen2.5 72b
    provider: ollama
    model: qwen2.5:72b
    apiBase: ${{ secrets.OLLAMA_MAC_STUDIO }}
    roles:
      - chat
      - edit
      - apply

  - name: (Mac Studio) qwen3.6:35b-a3b-coding-mxfp8
    provider: ollama
    model: qwen3.6:35b-a3b-coding-mxfp8
    apiBase: ${{ secrets.OLLAMA_MAC_STUDIO }}
    roles:
      - chat
      - edit
      - apply

  - name: (Mac Studio) deepseek-r1:70b-llama-distill-q4_K_M
    provider: ollama
    model: deepseek-r1:70b-llama-distill-q4_K_M
    apiBase: ${{ secrets.OLLAMA_MAC_STUDIO }}
    roles:
      - chat
      - edit
      - apply

  - name: (RTX 3090) Qwen 3.6 27B
    provider: ollama
    model: qwen3.6:27b-q4_K_M
    apiBase: ${{ secrets.OLLAMA_3090 }}
    roles:
      - chat
      - edit
      - apply

  - name: (RTX 3090) Qwen 3 coder 30B
    provider: ollama
    model: qwen3-coder:30b
    apiBase: ${{ secrets.OLLAMA_3090 }}
    roles:
      - chat
      - edit
      - apply

  - name: (RTX 3090) deepseek coder 33b
    provider: ollama
    model: deepseek-coder:33b
    apiBase: ${{ secrets.OLLAMA_3090 }}
    roles:
      - chat
      - edit
      - apply

  # -------------------------------------------------------------
  # 实时代码补全
  # -------------------------------------------------------------
  - name: AMD_780M Qwen 2.5 Coder 1.5B
    provider: ollama
    model: qwen2.5-coder:1.5b
    apiBase: ${{ secrets.OLLAMA_AMD_780M }}
    roles:
      - autocomplete
      - chat

  # -------------------------------------------------------------
  # 本地代码库向量检索
  # -------------------------------------------------------------
  - name: Qwen 3 Embedding 4B (HP ZBook)
    provider: ollama
    model: qwen3-embedding:4b
    apiBase: ${{ secrets.OLLAMA_AMD_780M }}
    roles:
      - embed

  # -------------------------------------------------------------
  # 重排序引擎 (Rerank) - 基于最新官方规范
  # -------------------------------------------------------------
  - name: BGE Reranker v2 M3 (HP ZBook)
    provider: huggingface-tei
    model: BAAI/bge-reranker-v2-m3
    apiBase: ${{ secrets.OLLAMA_AMD_RERANK }}
    roles:
      - rerank
